<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cash Wu Link</title>

        <!-- Google Fonts: Noto Sans JP -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

        <!-- Iconify Icons -->
        <script src="https://cdn.jsdelivr.net/npm/iconify-icon@1.0.7/dist/iconify-icon.min.js"></script>

        <style>
            :root {
                /* Catppuccin Latte */
                --latte-base: #eff1f5;
                --latte-mantle: #e6e9ef;
                --latte-crust: #dce0e8;
                --latte-surface0: #ccd0da;
                --latte-surface1: #bcc0cc;
                --latte-text: #4c4f69;
                --latte-subtext0: #6c6f85;
                --latte-subtext1: #5c5f77;
                --latte-sapphire: #7c6bb4;
                --latte-lavender: #7287fd;

                /* MUJI shadow system */
                --muji-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
                --muji: 0 2px 8px rgba(0, 0, 0, 0.06);
                --muji-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                min-height: 100vh;
                overflow-x: hidden;
                background: var(--latte-base);
                color: var(--latte-text);
                position: relative;
            }

            .background {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1;
                background: linear-gradient(180deg, var(--latte-base), var(--latte-mantle));
            }

            .container {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 3rem 1.5rem;
                position: relative;
                max-width: 480px;
                margin: 0 auto;
            }

            .profile-section {
                text-align: center;
                margin-bottom: 3rem;
            }

            .avatar-container {
                position: relative;
                display: inline-block;
                margin-bottom: 1.5rem;
            }

            .avatar {
                width: 120px;
                height: 120px;
                border-radius: 50%;
                border: 2px solid var(--latte-surface0);
                box-shadow: var(--muji);
                transition: box-shadow 0.3s ease;
            }

            .avatar:hover {
                box-shadow: var(--muji-md);
            }

            .name {
                font-size: 2rem;
                font-weight: 500;
                color: var(--latte-text);
                margin-bottom: 0.3rem;
                letter-spacing: 0.05em;
            }

            .subtitle {
                font-size: 0.95rem;
                color: var(--latte-subtext0);
                font-weight: 400;
            }

            .links-container {
                width: 100%;
                max-width: 400px;
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
            }

            .link-card {
                display: flex;
                align-items: center;
                padding: 1rem 1.5rem;
                text-decoration: none;
                color: var(--latte-text);
                font-weight: 400;
                border-radius: 12px;
                border: 1px solid var(--latte-surface0);
                background: #fff;
                box-shadow: var(--muji-sm);
                transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
                position: relative;
            }

            .link-card:hover {
                transform: translateY(-2px);
                box-shadow: var(--muji-md);
                border-color: var(--latte-sapphire);
            }

            .link-card:active {
                transform: translateY(0);
                box-shadow: var(--muji-sm);
            }

            .link-icon {
                margin-right: 1rem;
                color: var(--latte-sapphire);
            }

            .link-text {
                flex: 1;
                text-align: center;
                font-size: 0.95rem;
                font-weight: 400;
                letter-spacing: 0.03em;
            }

            .footer {
                margin-top: 3rem;
                text-align: center;
                color: var(--latte-subtext0);
                font-size: 0.8rem;
                font-weight: 300;
                letter-spacing: 0.05em;
            }

            @media (max-width: 480px) {
                .container {
                    padding: 2rem 1rem;
                }

                .name {
                    font-size: 1.6rem;
                }

                .avatar {
                    width: 100px;
                    height: 100px;
                }

                .links-container {
                    max-width: 100%;
                }

                .link-card {
                    padding: 0.9rem 1.2rem;
                }

                .link-text {
                    font-size: 0.9rem;
                }
            }

            .fade-in {
                opacity: 0;
                animation: fadeInUp 0.5s ease forwards;
            }

            .fade-in:nth-child(1) { animation-delay: 0.05s; }
            .fade-in:nth-child(2) { animation-delay: 0.1s; }
            .fade-in:nth-child(3) { animation-delay: 0.15s; }
            .fade-in:nth-child(4) { animation-delay: 0.2s; }
            .fade-in:nth-child(5) { animation-delay: 0.25s; }
            .fade-in:nth-child(6) { animation-delay: 0.3s; }
            .fade-in:nth-child(7) { animation-delay: 0.35s; }
            .fade-in:nth-child(8) { animation-delay: 0.4s; }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(12px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

        </style>
    </head>
    <body>
        <div class="background"></div>

        <div class="container">
            <div class="profile-section">
                <div class="avatar-container">
                    <img src="https://avatars.githubusercontent.com/u/4278751?v=4" alt="Cash Wu" class="avatar" />
                </div>
                <h1 class="name">Cash Wu</h1>
                <!--<p class="subtitle">Developer & Designer</p>-->
            </div>

            <div class="links-container">
                <a href="https://blog.cashwu.com" target="_blank" rel="noopener" class="link-card fade-in">
                    <iconify-icon icon="mdi:blog" width="32" height="32" class="link-icon"></iconify-icon>
                    <span class="link-text">Blog</span>
                </a>

                <a href="https://www.elephantshine.com" target="_blank" rel="noopener" class="link-card fade-in">
                    <iconify-icon icon="mdi:design" width="32" height="32" class="link-icon"></iconify-icon>
                    <span class="link-text">象晴設計工作室</span>
                </a>

                <a href="https://www.facebook.com/cashwugeek" target="_blank" rel="noopener" class="link-card fade-in">
                    <iconify-icon icon="mdi:facebook" width="32" height="32" class="link-icon"></iconify-icon>
                    <span class="link-text">FB 粉絲頁</span>
                </a>

                <a href="https://www.threads.net/@cashwugeek" target="_blank" rel="noopener" class="link-card fade-in">
                    <iconify-icon icon="simple-icons:threads" width="32" height="32" class="link-icon"></iconify-icon>
                    <span class="link-text">Threads</span>
                </a>

                <a href="https://x.com/CashWuGeek" target="_blank" rel="noopener" class="link-card fade-in">
                    <iconify-icon icon="mdi:twitter" width="32" height="32" class="link-icon"></iconify-icon>
                    <span class="link-text">X (Twitter)</span>
                </a>

                <a href="https://github.com/cashwu" target="_blank" rel="noopener" class="link-card fade-in">
                    <iconify-icon icon="mdi:github" width="32" height="32" class="link-icon"></iconify-icon>
                    <span class="link-text">GitHub</span>
                </a>

                <a href="mailto:cashwugeek@icloud.com" target="_blank" rel="noopener" class="link-card fade-in">
                    <iconify-icon icon="mdi:email" width="32" height="32" class="link-icon"></iconify-icon>
                    <span class="link-text">Email</span>
                </a>

                <a href="https://portaly.cc/cashwugeek" target="_blank" rel="noopener" class="link-card fade-in">
                    <img src="portaly.webp" alt="Portaly" width="32" height="32" class="link-icon" style="border-radius: 6px" />
                    <span class="link-text">Portaly</span>
                </a>
            </div>

            <footer class="footer">
                <p>© <span id="year"></span> Cash Wu</p>
            </footer>
        </div>

        <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
    </body>
</html>
