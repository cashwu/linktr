<!doctype html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cash Wu Link</title>

        <!-- Iconify Icons -->
        <script src="https://cdn.jsdelivr.net/npm/iconify-icon@1.0.7/dist/iconify-icon.min.js"></script>

        <style>
            :root {
                /* 野獸派紫色系配色 */
                --fauve-purple-1: #8B2FC9;
                --fauve-purple-2: #D946EF;
                --fauve-purple-3: #5B21B6;
                --fauve-purple-4: #A855F7;
                --fauve-yellow: #FBBF24;
                --fauve-orange: #FB923C;
                --fauve-cyan: #2DD4BF;
                --fauve-pink: #EC4899;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
                min-height: 100vh;
                overflow-x: hidden;
                background: var(--fauve-purple-1);
                position: relative;
            }

            /* 野獸派複雜幾何背景 */
            .background {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1;
                background: var(--fauve-purple-1);
                overflow: hidden;
            }

            /* 小型點綴色塊 */
            .background::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background:
                    radial-gradient(circle at 15% 20%, var(--fauve-purple-2) 0%, var(--fauve-purple-2) 5%, transparent 5%),
                    radial-gradient(circle at 85% 15%, var(--fauve-orange) 0%, var(--fauve-orange) 4%, transparent 4%),
                    radial-gradient(circle at 70% 80%, var(--fauve-cyan) 0%, var(--fauve-cyan) 6%, transparent 6%),
                    radial-gradient(circle at 30% 75%, var(--fauve-yellow) 0%, var(--fauve-yellow) 3.5%, transparent 3.5%),
                    radial-gradient(circle at 90% 60%, var(--fauve-pink) 0%, var(--fauve-pink) 3%, transparent 3%),
                    radial-gradient(circle at 45% 10%, var(--fauve-purple-4) 0%, var(--fauve-purple-4) 2.5%, transparent 2.5%),
                    radial-gradient(circle at 20% 50%, var(--fauve-purple-2) 0%, var(--fauve-purple-2) 2%, transparent 2%),
                    radial-gradient(circle at 95% 85%, var(--fauve-yellow) 0%, var(--fauve-yellow) 2.5%, transparent 2.5%);
            }

            /* 幾何線條與形狀 */
            .background::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background:
                    linear-gradient(45deg, transparent 48%, var(--fauve-purple-4) 48%, var(--fauve-purple-4) 52%, transparent 52%),
                    linear-gradient(-45deg, transparent 35%, var(--fauve-purple-3) 35%, var(--fauve-purple-3) 38%, transparent 38%),
                    linear-gradient(135deg, transparent 62%, var(--fauve-purple-2) 62%, var(--fauve-purple-2) 65%, transparent 65%),
                    repeating-linear-gradient(90deg, transparent, transparent 50px, var(--fauve-purple-3) 50px, var(--fauve-purple-3) 53px, transparent 53px, transparent 100px),
                    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255, 255, 255, 0.1) 60px, rgba(255, 255, 255, 0.1) 62px);
                opacity: 0.6;
            }

            /* 主容器 */
            .container {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 2rem 1rem;
                position: relative;
            }

            /* 野獸派頭像區域 */
            .profile-section {
                text-align: center;
                margin-bottom: 3rem;
            }

            .avatar-container {
                position: relative;
                display: inline-block;
                margin-bottom: 1.5rem;
            }

            .avatar {
                width: 140px;
                height: 140px;
                border-radius: 50%;
                border: 6px solid #000;
                box-shadow: 8px 8px 0 var(--fauve-yellow);
                transition: all 0.2s ease;
            }

            .avatar:hover {
                transform: translate(-4px, -4px);
                box-shadow: 12px 12px 0 var(--fauve-yellow);
            }

            .name {
                font-size: 3rem;
                font-weight: 900;
                color: #fff;
                text-shadow:
                    4px 4px 0 #000,
                    -1px -1px 0 #000,
                    1px -1px 0 #000,
                    -1px 1px 0 #000,
                    1px 1px 0 #000;
                margin-bottom: 0.5rem;
                letter-spacing: 2px;
            }

            .subtitle {
                font-size: 1.2rem;
                color: var(--fauve-yellow);
                font-weight: 700;
                text-transform: uppercase;
            }

            /* 連結容器 */
            .links-container {
                width: 100%;
                max-width: 400px;
                display: flex;
                flex-direction: column;
                gap: 1rem;
            }

            /* 野獸派連結卡片 */
            .link-card {
                display: flex;
                align-items: center;
                padding: 1.5rem 2rem;
                text-decoration: none;
                color: #000;
                font-weight: 700;
                border-radius: 8px;
                border: 5px solid #000;
                transition: all 0.2s ease;
                position: relative;
                overflow: visible;
            }

            /* 為每張卡片設定不同的野獸派色彩 */
            .link-card:nth-child(1) { background: var(--fauve-purple-2); }
            .link-card:nth-child(2) { background: var(--fauve-yellow); }
            .link-card:nth-child(3) { background: var(--fauve-purple-4); }
            .link-card:nth-child(4) { background: var(--fauve-orange); }
            .link-card:nth-child(5) { background: var(--fauve-cyan); }
            .link-card:nth-child(6) { background: var(--fauve-purple-3); color: #fff; }
            .link-card:nth-child(7) { background: var(--fauve-pink); }
            .link-card:nth-child(8) { background: var(--fauve-purple-1); color: #fff; }

            .link-card:hover {
                transform: translate(-3px, -3px);
                box-shadow: 8px 8px 0 #000;
            }

            .link-card:active {
                transform: translate(0, 0);
                box-shadow: 3px 3px 0 #000;
            }

            .link-icon {
                margin-right: 1rem;
                filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.3));
            }

            .link-text {
                flex: 1;
                text-align: center;
                font-size: 1.2rem;
                font-weight: 800;
                letter-spacing: 0.5px;
                text-transform: uppercase;
            }

            /* 野獸派頁腳 */
            .footer {
                margin-top: 3rem;
                text-align: center;
                color: #fff;
                font-size: 1rem;
                font-weight: 700;
                text-shadow: 2px 2px 0 #000;
            }

            /* 野獸派響應式設計 */
            @media (max-width: 480px) {
                .container {
                    padding: 1.5rem 1rem;
                }

                .name {
                    font-size: 2.2rem;
                    text-shadow:
                        3px 3px 0 #000,
                        -1px -1px 0 #000,
                        1px -1px 0 #000,
                        -1px 1px 0 #000,
                        1px 1px 0 #000;
                }

                .avatar {
                    width: 120px;
                    height: 120px;
                    border: 5px solid #000;
                    box-shadow: 6px 6px 0 var(--fauve-yellow);
                }

                .avatar:hover {
                    box-shadow: 8px 8px 0 var(--fauve-yellow);
                }

                .links-container {
                    max-width: 100%;
                }

                .link-card {
                    padding: 1.2rem 1.5rem;
                    border: 4px solid #000;
                }

                .link-card:hover {
                    box-shadow: 6px 6px 0 #000;
                }

                .link-text {
                    font-size: 1rem;
                }
            }

            /* 野獸派簡化動畫 */
            .fade-in {
                animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            }

            .fade-in:nth-child(1) { animation-delay: 0.05s; }
            .fade-in:nth-child(2) { animation-delay: 0.1s; }
            .fade-in:nth-child(3) { animation-delay: 0.15s; }
            .fade-in:nth-child(4) { animation-delay: 0.2s; }
            .fade-in:nth-child(5) { animation-delay: 0.25s; }
            .fade-in:nth-child(6) { animation-delay: 0.3s; }
            .fade-in:nth-child(7) { animation-delay: 0.35s; }
            .fade-in:nth-child(8) { animation-delay: 0.4s; }

            @keyframes popIn {
                from {
                    opacity: 0;
                    transform: scale(0.8);
                }
                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }

            /* 頭像旋轉效果 */
            .pulse {
                animation: rotate 8s linear infinite;
            }

            @keyframes rotate {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        </style>
    </head>
    <body>
        <div class="background"></div>

        <div class="container">
            <div class="profile-section">
                <div class="avatar-container">
                    <img src="https://avatars.githubusercontent.com/u/4278751?v=4" alt="Cash Wu" class="avatar pulse" />
                </div>
                <h1 class="name">Cash Wu</h1>
                <!--<p class="subtitle">Developer & Designer</p>-->
            </div>

            <div class="links-container">
                <a href="https://blog.cashwu.com" target="_blank" rel="noopener" class="link-card fade-in">
                    <iconify-icon icon="mdi:blog" width="32" height="32" class="link-icon"></iconify-icon>
                    <span class="link-text">Blog</span>
                </a>

                <a href="https://www.elephantshine.com" target="_blank" rel="noopener" class="link-card fade-in">
                    <iconify-icon icon="mdi:design" width="32" height="32" class="link-icon"></iconify-icon>
                    <span class="link-text">象晴設計工作室</span>
                </a>

                <a href="https://www.facebook.com/cashwugeek" target="_blank" rel="noopener" class="link-card fade-in">
                    <iconify-icon icon="mdi:facebook" width="32" height="32" class="link-icon"></iconify-icon>
                    <span class="link-text">FB 粉絲頁</span>
                </a>

                <a href="https://www.threads.net/@cashwugeek" target="_blank" rel="noopener" class="link-card fade-in">
                    <iconify-icon icon="simple-icons:threads" width="32" height="32" class="link-icon"></iconify-icon>
                    <span class="link-text">Threads</span>
                </a>

                <a href="https://x.com/CashWuGeek" target="_blank" rel="noopener" class="link-card fade-in">
                    <iconify-icon icon="mdi:twitter" width="32" height="32" class="link-icon"></iconify-icon>
                    <span class="link-text">X (Twitter)</span>
                </a>

                <a href="https://github.com/cashwu" target="_blank" rel="noopener" class="link-card fade-in">
                    <iconify-icon icon="mdi:github" width="32" height="32" class="link-icon"></iconify-icon>
                    <span class="link-text">GitHub</span>
                </a>

                <a href="mailto:cashwugeek@icloud.com" target="_blank" rel="noopener" class="link-card fade-in">
                    <iconify-icon icon="mdi:email" width="32" height="32" class="link-icon"></iconify-icon>
                    <span class="link-text">Email</span>
                </a>

                <a href="https://portaly.cc/cashwugeek" target="_blank" rel="noopener" class="link-card fade-in">
                    <img src="portaly.webp" alt="Portaly" width="32" height="32" class="link-icon" style="border-radius: 6px" />
                    <span class="link-text">Portaly</span>
                </a>
            </div>

            <footer class="footer">
                <p>© 2025 Cash Wu</p>
            </footer>
        </div>

        <script>
            // 野獸派簡化互動效果
            document.addEventListener("DOMContentLoaded", function () {
                // 為連結卡片添加色彩變化效果
                const linkCards = document.querySelectorAll(".link-card");
                const colors = [
                    'var(--fauve-purple-2)',
                    'var(--fauve-yellow)',
                    'var(--fauve-purple-4)',
                    'var(--fauve-orange)',
                    'var(--fauve-cyan)',
                    'var(--fauve-purple-3)',
                    'var(--fauve-pink)',
                    'var(--fauve-purple-1)'
                ];

                linkCards.forEach((card, index) => {
                    card.addEventListener('mouseenter', function() {
                        // 隨機切換到另一個鮮豔顏色
                        const currentIndex = index;
                        let newIndex = currentIndex;
                        while (newIndex === currentIndex) {
                            newIndex = Math.floor(Math.random() * colors.length);
                        }
                        card.style.backgroundColor = colors[newIndex];
                    });

                    card.addEventListener('mouseleave', function() {
                        // 恢復原本的顏色
                        card.style.backgroundColor = colors[index];
                    });
                });
            });
        </script>
    </body>
</html>
